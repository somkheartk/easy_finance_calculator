name: easy_finance_calculator
description: A production-ready personal finance calculator app for iOS and Android.
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Storage
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^13.2.0

  # Charts
  fl_chart: ^0.68.0

  # Fonts & Icons
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
